<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Quà của em Dũng</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Nunito", sans-serif;
        text-align: center;
        background: linear-gradient(
          160deg,
          #ffb3d9 0%,
          #ffd6ec 50%,
          #fff0f8 100%
        );
        min-height: 100vh;
        color: white;
        overflow: hidden;
        position: relative;
      }

      /* floating petals bg */
      .petal {
        position: fixed;
        font-size: 20px;
        pointer-events: none;
        animation: petalFall linear forwards;
        z-index: 0;
        opacity: 0.7;
      }
      @keyframes petalFall {
        0% {
          transform: translateY(-40px) rotate(0deg);
          opacity: 0.8;
        }
        100% {
          transform: translateY(105vh) rotate(540deg);
          opacity: 0;
        }
      }

      .container {
        position: relative;
        z-index: 1;
        padding-top: 60px;
      }

      h1 {
        font-family: "Pacifico", cursive;
        font-size: clamp(1.6rem, 5vw, 2.6rem);
        color: #d63384;
        text-shadow: 2px 4px 0 rgba(255, 100, 160, 0.2);
        margin-bottom: 8px;
        animation: titleDrop 0.8s cubic-bezier(0.36, 1.56, 0.64, 1) both;
      }
      @keyframes titleDrop {
        from {
          transform: translateY(-30px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .subtitle {
        color: #e91e8c;
        font-size: 1rem;
        font-weight: 700;
        margin-bottom: 48px;
        opacity: 0;
        animation: fadeUp 0.6s 0.4s ease both;
      }
      @keyframes fadeUp {
        from {
          transform: translateY(10px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .option-container {
        display: flex;
        align-items: stretch;
        justify-content: center;
        gap: 24px;
        flex-wrap: wrap;
        padding: 0 20px;
      }

      .option {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 220px;
        padding: 28px 20px 24px;
        background: white;
        border-radius: 24px;
        cursor: pointer;
        box-shadow:
          0 12px 32px rgba(255, 79, 160, 0.2),
          0 2px 8px rgba(0, 0, 0, 0.06);
        border: 2px solid rgba(255, 120, 180, 0.15);
        transition:
          transform 0.28s cubic-bezier(0.36, 1.56, 0.64, 1),
          box-shadow 0.28s;
        position: relative;
        overflow: hidden;
        opacity: 0;
        animation: cardPop 0.6s cubic-bezier(0.36, 1.56, 0.64, 1) both;
        text-decoration: none;
      }
      .option:nth-child(1) {
        animation-delay: 0.5s;
      }
      .option:nth-child(2) {
        animation-delay: 0.65s;
      }
      .option:nth-child(3) {
        animation-delay: 0.8s;
      }

      @keyframes cardPop {
        from {
          transform: scale(0.6) translateY(20px);
          opacity: 0;
        }
        to {
          transform: scale(1) translateY(0);
          opacity: 1;
        }
      }

      .option::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(255, 214, 236, 0.4),
          transparent 60%
        );
        pointer-events: none;
      }

      .option:hover {
        transform: scale(1.07) translateY(-6px);
        box-shadow: 0 20px 48px rgba(255, 79, 160, 0.32);
      }
      .option:active {
        transform: scale(0.97);
      }

      .option-label {
        font-size: 1.05rem;
        font-weight: 800;
        color: #d63384;
        margin-bottom: 16px;
        line-height: 1.3;
      }

      .option-img {
        width: 130px;
        height: 130px;
        margin-bottom: 16px;
        filter: drop-shadow(0 6px 12px rgba(255, 79, 160, 0.2));
        transition: transform 0.3s;
      }
      .option:hover .option-img {
        transform: scale(1.08) rotate(-2deg);
      }

      .option-btn {
        margin-top: auto;
        padding: 8px 22px;
        background: linear-gradient(135deg, #ff4fa0, #ff3d87);
        color: white;
        border-radius: 50px;
        font-family: "Nunito", sans-serif;
        font-size: 0.88rem;
        font-weight: 800;
        box-shadow: 0 4px 12px rgba(255, 61, 135, 0.3);
        letter-spacing: 0.3px;
      }
    </style>
  </head>

  <body>
    <!-- bg petals -->
    <div id="petals"></div>

    <div class="container">
      <h1>🌸 Chúc Mừng Ngày 8/3 🌸</h1>
      <p class="subtitle">Vào đây nhận quà nào chị Hằng Bùi nè 💕</p>

      <div class="option-container">
        <!-- 1. Lá thư -->
        <div class="option" onclick="goTo('loichuc.html')">
          <div class="option-label">Nhận lời chúc 💌</div>
          <svg
            class="option-img"
            viewBox="0 0 130 130"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <!-- envelope body -->
            <rect
              x="12"
              y="38"
              width="106"
              height="72"
              rx="10"
              fill="#fff0f8"
              stroke="#ffb3d9"
              stroke-width="3"
            />
            <!-- envelope flap (open) -->
            <path
              d="M12 48 L65 82 L118 48 L118 38 Q118 28 108 28 L22 28 Q12 28 12 38 Z"
              fill="#ffd6ec"
              stroke="#ffb3d9"
              stroke-width="2.5"
            />
            <!-- V fold line -->
            <path
              d="M12 48 L65 82 L118 48"
              stroke="#ff8cc8"
              stroke-width="2"
              stroke-linecap="round"
            />
            <!-- letter sticking out -->
            <rect
              x="38"
              y="14"
              width="54"
              height="52"
              rx="6"
              fill="white"
              stroke="#ffb3d9"
              stroke-width="2.5"
            />
            <!-- letter lines -->
            <line
              x1="48"
              y1="30"
              x2="82"
              y2="30"
              stroke="#ffb3d9"
              stroke-width="2.5"
              stroke-linecap="round"
            />
            <line
              x1="48"
              y1="40"
              x2="82"
              y2="40"
              stroke="#ffb3d9"
              stroke-width="2.5"
              stroke-linecap="round"
            />
            <line
              x1="48"
              y1="50"
              x2="70"
              y2="50"
              stroke="#ffb3d9"
              stroke-width="2.5"
              stroke-linecap="round"
            />
            <!-- heart on letter -->
            <path
              d="M60 20 C60 17 57 15 55 17 C53 15 50 17 50 20 C50 24 55 27 55 27 C55 27 60 24 60 20Z"
              fill="#ff4fa0"
            />
            <!-- stars -->
            <text x="18" y="34" font-size="11">✨</text>
            <text x="98" y="34" font-size="11">✨</text>
          </svg>
          <div class="option-btn">Mở ra xem →</div>
        </div>

        <!-- 2. Bó hoa -->
        <div class="option" onclick="goTo('hoa.html')">
          <div class="option-label">Nhận bó hoa 💐</div>
          <svg
            class="option-img"
            viewBox="0 0 130 130"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <!-- stems -->
            <path
              d="M65 105 Q60 85 55 70"
              stroke="#66bb6a"
              stroke-width="3"
              stroke-linecap="round"
            />
            <path
              d="M65 105 Q65 82 65 65"
              stroke="#4caf50"
              stroke-width="3"
              stroke-linecap="round"
            />
            <path
              d="M65 105 Q70 85 75 70"
              stroke="#66bb6a"
              stroke-width="3"
              stroke-linecap="round"
            />
            <path
              d="M65 105 Q74 88 80 75"
              stroke="#81c784"
              stroke-width="3"
              stroke-linecap="round"
            />
            <path
              d="M65 105 Q56 88 50 75"
              stroke="#81c784"
              stroke-width="3"
              stroke-linecap="round"
            />
            <!-- leaves -->
            <ellipse
              cx="55"
              cy="82"
              rx="9"
              ry="5"
              fill="#81c784"
              transform="rotate(-30 55 82)"
            />
            <ellipse
              cx="75"
              cy="82"
              rx="9"
              ry="5"
              fill="#81c784"
              transform="rotate(30 75 82)"
            />
            <!-- wrap -->
            <path
              d="M45 98 Q65 108 85 98 L80 118 Q65 124 50 118 Z"
              fill="#ffd6ec"
              stroke="#ffb3d9"
              stroke-width="2"
            />
            <path
              d="M52 98 L55 118 M65 100 L65 120 M78 98 L75 118"
              stroke="#ffb3d9"
              stroke-width="1.5"
              stroke-linecap="round"
            />
            <!-- ribbon bow -->
            <path
              d="M58 100 Q52 94 56 90 Q60 86 65 92 Q70 86 74 90 Q78 94 72 100 Q65 96 58 100Z"
              fill="#ff4fa0"
            />
            <!-- flower 1 - pink center -->
            <circle cx="65" cy="48" r="10" fill="#ff4fa0" />
            <circle cx="65" cy="48" r="5" fill="#ffd700" />
            <ellipse cx="65" cy="36" rx="6" ry="8" fill="#ff8cc8" />
            <ellipse cx="65" cy="60" rx="6" ry="8" fill="#ff8cc8" />
            <ellipse cx="53" cy="48" rx="8" ry="6" fill="#ff8cc8" />
            <ellipse cx="77" cy="48" rx="8" ry="6" fill="#ff8cc8" />
            <ellipse
              cx="56"
              cy="39"
              rx="6"
              ry="8"
              fill="#ffb3d9"
              transform="rotate(-45 56 39)"
            />
            <ellipse
              cx="74"
              cy="57"
              rx="6"
              ry="8"
              fill="#ffb3d9"
              transform="rotate(-45 74 57)"
            />
            <ellipse
              cx="74"
              cy="39"
              rx="6"
              ry="8"
              fill="#ffb3d9"
              transform="rotate(45 74 39)"
            />
            <ellipse
              cx="56"
              cy="57"
              rx="6"
              ry="8"
              fill="#ffb3d9"
              transform="rotate(45 56 57)"
            />
            <!-- flower 2 - small left -->
            <circle cx="46" cy="66" r="7" fill="#ff7043" />
            <circle cx="46" cy="66" r="3.5" fill="#ffd700" />
            <ellipse cx="46" cy="57" rx="4" ry="6" fill="#ffab91" />
            <ellipse cx="46" cy="75" rx="4" ry="6" fill="#ffab91" />
            <ellipse cx="37" cy="66" rx="6" ry="4" fill="#ffab91" />
            <ellipse cx="55" cy="66" rx="6" ry="4" fill="#ffab91" />
            <!-- flower 3 - small right -->
            <circle cx="84" cy="62" r="7" fill="#ab47bc" />
            <circle cx="84" cy="62" r="3.5" fill="#ffd700" />
            <ellipse cx="84" cy="53" rx="4" ry="6" fill="#ce93d8" />
            <ellipse cx="84" cy="71" rx="4" ry="6" fill="#ce93d8" />
            <ellipse cx="75" cy="62" rx="6" ry="4" fill="#ce93d8" />
            <ellipse cx="93" cy="62" rx="6" ry="4" fill="#ce93d8" />
            <!-- small buds -->
            <circle cx="52" cy="55" r="5" fill="#ff4fa0" />
            <circle cx="78" cy="52" r="5" fill="#ff80ab" />
            <!-- sparkles -->
            <text x="14" y="30" font-size="12">✨</text>
            <text x="100" y="40" font-size="12">🌟</text>
          </svg>
          <div class="option-btn">Nhận hoa →</div>
        </div>

        <!-- 3. Hộp quà -->
        <div class="option" onclick="goTo('qua.html')">
          <div class="option-label">Tìm món quà bí mật 🎁</div>
          <svg
            class="option-img"
            viewBox="0 0 130 130"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <!-- box shadow -->
            <ellipse
              cx="65"
              cy="112"
              rx="38"
              ry="7"
              fill="rgba(255,79,160,0.12)"
            />
            <!-- box body -->
            <rect x="22" y="62" width="86" height="50" rx="8" fill="#ff5fa2" />
            <rect
              x="22"
              y="62"
              width="86"
              height="50"
              rx="8"
              fill="url(#boxGrad)"
            />
            <!-- box body shine -->
            <rect
              x="28"
              y="68"
              width="20"
              height="38"
              rx="4"
              fill="rgba(255,255,255,0.12)"
            />
            <!-- vertical ribbon on body -->
            <rect
              x="60"
              y="62"
              width="10"
              height="50"
              rx="0"
              fill="rgba(255,255,255,0.3)"
            />
            <!-- lid -->
            <rect x="16" y="46" width="98" height="22" rx="8" fill="#ff3d87" />
            <rect
              x="16"
              y="46"
              width="98"
              height="22"
              rx="8"
              fill="url(#lidGrad)"
            />
            <!-- vertical ribbon on lid -->
            <rect
              x="60"
              y="46"
              width="10"
              height="22"
              fill="rgba(255,255,255,0.35)"
            />
            <!-- bow left loop -->
            <path
              d="M65 46 Q48 28 42 36 Q38 42 52 46 Z"
              fill="#fff"
              opacity="0.9"
            />
            <!-- bow right loop -->
            <path
              d="M65 46 Q82 28 88 36 Q92 42 78 46 Z"
              fill="#fff"
              opacity="0.9"
            />
            <!-- bow center knot -->
            <circle cx="65" cy="46" r="7" fill="#ffd700" />
            <circle cx="65" cy="46" r="4" fill="#ffeb60" />
            <!-- star on bow -->
            <text x="59" y="50" font-size="8">★</text>
            <!-- question mark on box -->
            <text
              x="50"
              y="96"
              font-size="28"
              fill="rgba(255,255,255,0.5)"
              font-weight="900"
              font-family="Arial"
            >
              ?
            </text>
            <!-- small hearts -->
            <path
              d="M30 76 C30 74 27 72 26 74 C25 72 22 74 22 76 C22 79 26 81 26 81 C26 81 30 79 30 76Z"
              fill="#fff"
              opacity="0.6"
            />
            <path
              d="M108 82 C108 80 105 78 104 80 C103 78 100 80 100 82 C100 85 104 87 104 87 C104 87 108 85 108 82Z"
              fill="#fff"
              opacity="0.6"
            />
            <!-- sparkles -->
            <text x="10" y="40" font-size="13">✨</text>
            <text x="104" y="58" font-size="11">⭐</text>
            <text x="18" y="108" font-size="11">💫</text>
            <defs>
              <linearGradient
                id="boxGrad"
                x1="22"
                y1="62"
                x2="108"
                y2="112"
                gradientUnits="userSpaceOnUse"
              >
                <stop offset="0%" stop-color="rgba(255,255,255,0.15)" />
                <stop offset="100%" stop-color="rgba(0,0,0,0.05)" />
              </linearGradient>
              <linearGradient
                id="lidGrad"
                x1="16"
                y1="46"
                x2="114"
                y2="68"
                gradientUnits="userSpaceOnUse"
              >
                <stop offset="0%" stop-color="rgba(255,255,255,0.2)" />
                <stop offset="100%" stop-color="rgba(0,0,0,0.05)" />
              </linearGradient>
            </defs>
          </svg>
          <div class="option-btn">Mở quà →</div>
        </div>
      </div>
    </div>

    <script>
      function goTo(page) {
        window.location.href = page;
      }

      // bg petals
      const petalEl = document.getElementById("petals");
      const PETALS = ["🌸", "🌺", "🌷", "🌼", "💮", "🏵️"];
      function spawnPetal() {
        const p = document.createElement("div");
        p.className = "petal";
        p.textContent = PETALS[Math.floor(Math.random() * PETALS.length)];
        p.style.left = Math.random() * 100 + "vw";
        p.style.top = "-40px";
        const dur = 5 + Math.random() * 5;
        p.style.animationDuration = dur + "s";
        p.style.fontSize = 14 + Math.random() * 14 + "px";
        petalEl.appendChild(p);
        setTimeout(() => p.remove(), dur * 1000 + 200);
      }
      setInterval(spawnPetal, 350);
    </script>
  </body>
</html>
