<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Chị Hằng nhận hết nhóooo</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        height: 100vh;
        overflow: hidden;
        font-family: "Nunito", sans-serif;
        background: linear-gradient(
          160deg,
          #ffb3d9 0%,
          #ffd6ec 40%,
          #ffe8f4 70%,
          #fff0f8 100%
        );
        position: relative;
      }

      /* ── TITLE ── */
      .title {
        position: absolute;
        top: 32px;
        width: 100%;
        text-align: center;
        font-family: "Pacifico", cursive;
        font-size: clamp(1.4rem, 4vw, 2.2rem);
        color: #d63384;
        text-shadow: 2px 3px 0 rgba(255, 100, 160, 0.2);
        letter-spacing: 0.5px;
        z-index: 10;
        animation: titleDrop 0.8s cubic-bezier(0.36, 1.56, 0.64, 1) both;
      }
      @keyframes titleDrop {
        from {
          transform: translateY(-40px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .hint {
        position: absolute;
        top: 86px;
        width: 100%;
        text-align: center;
        font-size: 1rem;
        font-weight: 700;
        color: #e91e8c;
        z-index: 10;
        opacity: 0;
        animation: fadeUp 0.6s 0.5s ease both;
      }
      @keyframes fadeUp {
        from {
          transform: translateY(10px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      /* ── BACKGROUND FLOWERS (always falling) ── */
      .flower {
        position: absolute;
        font-size: 22px;
        pointer-events: none;
        animation: fall linear forwards;
        z-index: 0;
      }
      @keyframes fall {
        0% {
          transform: translateY(-40px) rotate(0deg);
          opacity: 1;
        }
        80% {
          opacity: 1;
        }
        100% {
          transform: translateY(105vh) rotate(540deg);
          opacity: 0;
        }
      }

      /* ── MESSAGE CARD ── */
      .message {
        position: absolute;
        max-width: 300px;
        background: white;
        padding: 20px 24px;
        border-radius: 20px;
        box-shadow:
          0 12px 32px rgba(255, 79, 160, 0.22),
          0 2px 8px rgba(0, 0, 0, 0.07);
        font-size: 1rem;
        font-weight: 700;
        color: #c2185b;
        cursor: pointer;
        border: 2px solid rgba(255, 120, 180, 0.18);
        z-index: 20;
        user-select: none;
        transition:
          transform 0.25s,
          box-shadow 0.25s;
      }
      .message::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 18px;
        background: linear-gradient(
          135deg,
          rgba(255, 200, 230, 0.3),
          transparent 60%
        );
        pointer-events: none;
      }
      .message:hover {
        transform: scale(1.07) rotate(-1deg) !important;
        box-shadow: 0 18px 40px rgba(255, 79, 160, 0.35);
      }
      .message:active {
        transform: scale(0.96) !important;
      }

      /* entrance animation */
      .message.appear {
        animation: cardAppear 0.6s cubic-bezier(0.36, 1.56, 0.64, 1) both;
      }
      @keyframes cardAppear {
        0% {
          transform: scale(0.3) rotate(-8deg);
          opacity: 0;
        }
        70% {
          transform: scale(1.08) rotate(1deg);
          opacity: 1;
        }
        100% {
          transform: scale(1) rotate(0deg);
          opacity: 1;
        }
      }

      /* exit animation */
      .message.vanish {
        animation: cardVanish 0.4s cubic-bezier(0.55, 0, 0.1, 1) forwards !important;
      }
      @keyframes cardVanish {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        40% {
          transform: scale(1.15) rotate(3deg);
        }
        100% {
          transform: scale(0) rotate(15deg);
          opacity: 0;
        }
      }

      /* float idle */
      .message.float {
        animation: cardFloat 3s ease-in-out infinite;
      }
      @keyframes cardFloat {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      /* icon badge */
      .msg-icon {
        font-size: 1.5rem;
        display: block;
        margin-bottom: 8px;
      }

      /* click hint pulse */
      .msg-tap {
        font-size: 0.75rem;
        font-weight: 600;
        color: #ff8cc8;
        margin-top: 10px;
        display: flex;
        align-items: center;
        gap: 4px;
        animation: pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.5;
        }
        50% {
          opacity: 1;
        }
      }

      /* ── FINAL MESSAGE ── */
      .final-overlay {
        position: fixed;
        inset: 0;
        background: rgba(255, 160, 210, 0.25);
        backdrop-filter: blur(6px);
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.5s ease both;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .final-card {
        max-width: 500px;
        width: 90%;
        background: white;
        padding: 48px 44px;
        border-radius: 28px;
        text-align: center;
        box-shadow:
          0 24px 60px rgba(255, 61, 135, 0.3),
          0 0 0 3px rgba(255, 120, 180, 0.2);
        position: relative;
        overflow: hidden;
        animation: finalPop 0.8s 0.2s cubic-bezier(0.36, 1.56, 0.64, 1) both;
      }
      @keyframes finalPop {
        from {
          transform: scale(0.5) rotate(-6deg);
          opacity: 0;
        }
        to {
          transform: scale(1) rotate(0);
          opacity: 1;
        }
      }
      .final-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(255, 214, 236, 0.4) 0%,
          transparent 55%,
          rgba(255, 214, 236, 0.2) 100%
        );
        pointer-events: none;
      }
      .final-big-emoji {
        font-size: 3.5rem;
        display: block;
        margin-bottom: 16px;
        animation: heartBeat 1.2s 1s ease-in-out infinite alternate;
      }
      @keyframes heartBeat {
        from {
          transform: scale(1);
        }
        to {
          transform: scale(1.18);
        }
      }
      .final-card h2 {
        font-family: "Pacifico", cursive;
        font-size: 1.5rem;
        color: #d63384;
        margin-bottom: 14px;
      }
      .final-card p {
        font-size: 1.15rem;
        font-weight: 700;
        color: #c2185b;
        line-height: 1.6;
      }
      .final-divider {
        width: 60px;
        height: 4px;
        background: linear-gradient(90deg, #ff4fa0, #ff8cc8);
        border-radius: 99px;
        margin: 16px auto;
      }
      .final-sub {
        font-size: 0.95rem !important;
        color: #e91e8c !important;
        margin-top: 12px !important;
      }

      /* ── BURST PARTICLES ── */
      .burst-p {
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        border-radius: 50%;
        animation: burstFly var(--dur, 0.8s) ease-out forwards;
      }
      @keyframes burstFly {
        0% {
          transform: translate(0, 0) scale(1);
          opacity: 1;
        }
        100% {
          transform: translate(var(--dx, 0), var(--dy, 0)) scale(0);
          opacity: 0;
        }
      }
      .burst-emoji {
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        font-size: 16px;
        animation: burstFly var(--dur, 0.8s) ease-out forwards;
      }

      /* ── COUNTER ── */
      #counter {
        position: absolute;
        bottom: 28px;
        width: 100%;
        text-align: center;
        z-index: 10;
        font-size: 0.9rem;
        font-weight: 700;
        color: #e91e8c;
      }
      .dots {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-top: 6px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(255, 79, 160, 0.25);
        transition:
          background 0.4s,
          transform 0.4s;
      }
      .dot.done {
        background: #ff4fa0;
        transform: scale(1.3);
      }
    </style>
  </head>

  <body>
    <div class="title">💌 Đi Tìm Lời Chúc 8/3</div>
    <div class="hint">🌺 Nhấn vào lời chúc để khám phá tiếp nhé!</div>

    <div id="counter">
      <div class="dots" id="dots"></div>
    </div>

    <script>
      const messages = [
        {
          icon: "💖",
          text: "Chúc chị luôn hạnh phúc và gặp thật nhiều may mắn trong cuộc sống!",
        },
        {
          icon: "✨",
          text: "Chúc chị luôn đạt được mọi ước mơ và mục tiêu của mình!",
        },
        {
          icon: "💐",
          text: "Chúc chị luôn được yêu thương và trân trọng mỗi ngày!",
        },
        {
          icon: "🌷",
          text: "Chúc chị có một ngày 8/3 thật vui vẻ và ý nghĩa!",
        },
        {
          icon: "🌸",
          text: "Chúc chị luôn xinh đẹp và rạng rỡ như những bông hoa em tặng nhé!",
        },
        {
          icon: "🌟",
          text: "Chúc chị luôn mạnh mẽ, tự tin và tỏa sáng theo cách của riêng mình!",
        },
        {
          icon: "🌼",
          text: "Chúc chị thật nhiều sức khỏe và gặp nhiều niềm vui!",
        },
      ];

      const COLORS = [
        "#ff4fa0",
        "#ff8c42",
        "#ffd700",
        "#4fc3f7",
        "#ab47bc",
        "#66bb6a",
        "#ef5350",
        "#26c6da",
        "#ff7043",
      ];
      const BURST_EMOJIS = [
        "🌸",
        "💖",
        "✨",
        "🌺",
        "💕",
        "🌷",
        "🍀",
        "🎀",
        "⭐",
      ];
      const FLOWERS = ["🌸", "🌺", "🌷", "🌼", "💮", "🏵️", "🌹"];

      let index = 0;

      // ── Dot indicators
      const dotsEl = document.getElementById("dots");
      messages.forEach(() => {
        const d = document.createElement("div");
        d.className = "dot";
        dotsEl.appendChild(d);
      });

      function updateDots() {
        document.querySelectorAll(".dot").forEach((d, i) => {
          if (i < index) d.classList.add("done");
        });
      }

      // ── Background flowers (always)
      function spawnFlower() {
        const el = document.createElement("div");
        el.className = "flower";
        el.textContent = FLOWERS[Math.floor(Math.random() * FLOWERS.length)];
        el.style.left = Math.random() * 100 + "vw";
        el.style.top = "-40px";
        const dur = 4 + Math.random() * 4;
        el.style.animationDuration = dur + "s";
        el.style.fontSize = 16 + Math.random() * 16 + "px";
        el.style.opacity = 0.6 + Math.random() * 0.4;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), dur * 1000 + 200);
      }
      setInterval(spawnFlower, 280);

      // ── Burst from element
      function burst(el) {
        const rect = el.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const count = 22;

        for (let i = 0; i < count; i++) {
          const angle = (i / count) * Math.PI * 2;
          const speed = 50 + Math.random() * 90;
          const dx = Math.cos(angle) * speed;
          const dy = Math.sin(angle) * speed;
          const dur = 0.5 + Math.random() * 0.5;
          const color = COLORS[Math.floor(Math.random() * COLORS.length)];
          const size = 5 + Math.random() * 8;

          const p = document.createElement("div");
          p.className = "burst-p";
          p.style.cssText = `left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;background:${color};margin-left:${-size / 2}px;margin-top:${-size / 2}px;--dx:${dx}px;--dy:${dy}px;--dur:${dur}s;`;
          document.body.appendChild(p);
          setTimeout(() => p.remove(), dur * 1000 + 50);
        }

        for (let i = 0; i < 10; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 40 + Math.random() * 70;
          const dx = Math.cos(angle) * speed;
          const dy = Math.sin(angle) * speed;
          const dur = 0.6 + Math.random() * 0.5;
          const emoji =
            BURST_EMOJIS[Math.floor(Math.random() * BURST_EMOJIS.length)];

          const p = document.createElement("div");
          p.className = "burst-emoji";
          p.textContent = emoji;
          p.style.cssText = `left:${cx}px;top:${cy}px;margin-left:-8px;margin-top:-8px;--dx:${dx}px;--dy:${dy}px;--dur:${dur}s;`;
          document.body.appendChild(p);
          setTimeout(() => p.remove(), dur * 1000 + 50);
        }
      }

      // ── Show message
      function showMessage() {
        if (index === messages.length) {
          showFinal();
          return;
        }

        const data = messages[index];
        const card = document.createElement("div");
        card.className = "message appear";

        // Render off-screen first to measure real size
        card.style.visibility = "hidden";
        card.style.left = "0px";
        card.style.top = "0px";

        card.innerHTML = `
          <span class="msg-icon">${data.icon}</span>
          ${data.text}
          <div class="msg-tap">💮 Nhấn vào đây</div>
        `;

        document.body.appendChild(card);

        // Measure card size, then place safely within viewport
        const cardW = card.offsetWidth;
        const cardH = card.offsetHeight;
        const margin = 16;
        const topMin = 120 + margin;
        const topMax = window.innerHeight - cardH - 60;
        const leftMin = margin;
        const leftMax = window.innerWidth - cardW - margin;

        card.style.top =
          topMin + Math.random() * Math.max(0, topMax - topMin) + "px";
        card.style.left =
          leftMin + Math.random() * Math.max(0, leftMax - leftMin) + "px";
        card.style.visibility = "visible";

        // After appear, switch to float
        setTimeout(() => {
          card.classList.remove("appear");
          card.classList.add("float");
        }, 700);

        card.onclick = () => {
          burst(card);
          card.classList.remove("float");
          card.classList.add("vanish");
          setTimeout(() => {
            card.remove();
            index++;
            updateDots();
            showMessage();
          }, 380);
        };
      }

      // ── Final screen with flower burst
      function showFinal() {
        const overlay = document.createElement("div");
        overlay.className = "final-overlay";
        overlay.innerHTML = `
          <div class="final-card">
            <span class="final-big-emoji">💝</span>
            <h2>Chúc Mừng 8/3</h2>
            <div class="final-divider"></div>
            <p>Cảm ơn chị đã luôn là một người tuyệt vời.<br>Chúc chị một ngày 8/3 thật hạnh phúc và rực rỡ!</p>
            <p class="final-sub">🌸 Chị xứng đáng nhận được tất cả yêu thương trên đời này 🌸</p>
          </div>
        `;
        document.body.appendChild(overlay);

        // Big flower burst from center
        for (let k = 0; k < 6; k++) {
          setTimeout(() => {
            bigBurst(
              window.innerWidth * (0.2 + Math.random() * 0.6),
              window.innerHeight * (0.2 + Math.random() * 0.5),
            );
          }, k * 250);
        }
      }

      function bigBurst(cx, cy) {
        const count = 36;
        for (let i = 0; i < count; i++) {
          const angle = (i / count) * Math.PI * 2;
          const speed = 70 + Math.random() * 130;
          const dx = Math.cos(angle) * speed;
          const dy = Math.sin(angle) * speed;
          const dur = 0.7 + Math.random() * 0.7;
          const color = COLORS[Math.floor(Math.random() * COLORS.length)];
          const size = 7 + Math.random() * 10;
          const isCircle = Math.random() > 0.4;

          const p = document.createElement("div");
          p.className = "burst-p";
          p.style.cssText = `left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;background:${color};margin-left:${-size / 2}px;margin-top:${-size / 2}px;border-radius:${isCircle ? "50%" : "3px"};--dx:${dx}px;--dy:${dy}px;--dur:${dur}s;`;
          document.body.appendChild(p);
          setTimeout(() => p.remove(), dur * 1000 + 100);
        }

        for (let i = 0; i < 14; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 60 + Math.random() * 100;
          const dx = Math.cos(angle) * speed;
          const dy = Math.sin(angle) * speed;
          const dur = 0.7 + Math.random() * 0.6;
          const emoji =
            BURST_EMOJIS[Math.floor(Math.random() * BURST_EMOJIS.length)];

          const p = document.createElement("div");
          p.className = "burst-emoji";
          p.style.cssText = `left:${cx}px;top:${cy}px;margin-left:-8px;margin-top:-8px;--dx:${dx}px;--dy:${dy}px;--dur:${dur}s;font-size:${16 + Math.random() * 14}px;`;
          p.textContent = emoji;
          document.body.appendChild(p);
          setTimeout(() => p.remove(), dur * 1000 + 100);
        }
      }

      showMessage();
    </script>
  </body>
</html>
